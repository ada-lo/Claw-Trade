services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: openclaw_runtime
    working_dir: /app
    volumes:
      - .:/app
      - openclaw_modules:/app/node_modules
      - openclaw_config:/root/.openclaw
      - ./openclaw.json5:/root/.openclaw/openclaw.json5:ro
    ports:
      - "18789:18789"
      - "1933:1933"
      - "8020:8020"
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - HUGGINGFACE_HUB_TOKEN=${HF_TOKEN}
      - EXECUTION_MODE=${EXECUTION_MODE:-dry-run}
      - FORMAL_VERIFY_MODE=${FORMAL_VERIFY_MODE:-strict}
      - Z3_VERIFIER_URL=${Z3_VERIFIER_URL:-http://z3_verifier:5001}
      - NODE_OPTIONS=--max-old-space-size=512
    mem_limit: 1g
    security_opt:
      - no-new-privileges:true
    # Gateway does NOT auto-start. To start it manually:
    #   docker exec -it openclaw_runtime openclaw gateway run
    # Then open: http://localhost:18789
    command:
      - node
      - /app/src/server.js
    restart: unless-stopped
    depends_on:
      z3_verifier:
        condition: service_healthy

  z3_verifier:
    image: python:3.11-slim
    container_name: z3_verifier
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install z3-solver fastapi uvicorn --quiet &&
             uvicorn python.formal_verify:app --host 0.0.0.0 --port 5001"
    ports:
      - "5001:5001"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  openclaw_modules:
  openclaw_config:
